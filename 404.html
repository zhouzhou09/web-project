<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <script>
    var path = window.location.pathname;
    // 所有 /web-practice 路径重定向到正确仓库
    if (path === '/web-practice' || path.startsWith('/web-practice/')) {
      window.location.replace('https://zhouzhou09.github.io' + path);
    } else {
      // 其他路径是本项目的 React Router 路由，使用 hash 模式
      window.location.replace('https://zhouzhou09.github.io/#' + path);
    }
  </script>
</head>
<body></body>
</html>
