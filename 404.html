<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Redirecting...</title>
  <script>
    // 获取当前路径
    var path = window.location.pathname;
    
    // 如果访问的是 /web-practice 相关路径，重定向到正确的仓库
    if (path === '/web-practice' || path.startsWith('/web-practice/')) {
      // 保留子路径，重定向到 web-practice 仓库
      window.location.replace('https://zhouzhou09.github.io' + path);
    }
  </script>
</head>
<body>
  <h1>404 - Page Not Found</h1>
  <p>If you are not redirected automatically, <a href="https://zhouzhou09.github.io/">click here</a>.</p>
</body>
</html>
